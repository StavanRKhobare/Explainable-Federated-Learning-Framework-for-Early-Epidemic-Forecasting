
services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: fedxgnn-server
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped


  client-bangalore:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: fedxgnn-client-bangalore
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - CENSUSCODE=572
      - NAME=Bangalore General Hospital
      - SERVER_URL=http://server:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  client-chennai:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: fedxgnn-client-chennai
    ports:
      - "8002:8002"
    environment:
      - PORT=8002
      - CENSUSCODE=632
      - NAME=Chennai Medical College
      - SERVER_URL=http://server:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  client-delhi:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: fedxgnn-client-delhi
    ports:
      - "8003:8003"
    environment:
      - PORT=8003
      - CENSUSCODE=94
      - NAME=New Delhi Hospital
      - SERVER_URL=http://server:8000
      - PYTHONUNBUFFERED=1
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fedxgnn-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_BACKEND_URL=http://server:8000
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped


